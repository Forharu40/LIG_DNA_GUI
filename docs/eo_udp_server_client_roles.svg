<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg { fill: #111821; }
      .leftBox { fill: #345d3d; stroke: #8ce29b; stroke-width: 3; rx: 20; ry: 20; }
      .rightBox { fill: #2a3f60; stroke: #8bc2ff; stroke-width: 3; rx: 20; ry: 20; }
      .arrow { stroke: #a5dbff; stroke-width: 10; fill: none; marker-end: url(#arrowHead2); }
      .title { fill: #eef4fb; font-size: 34px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; }
      .sub { fill: #bfd6ea; font-size: 20px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
      .boxTitle { fill: #eef4fb; font-size: 30px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; text-anchor: middle; }
      .boxText { fill: #d9e7f5; font-size: 22px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-anchor: middle; }
      .label { fill: #9ee3ff; font-size: 24px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-weight: 700; text-anchor: middle; }
      .note { fill: #f0f6fb; font-size: 22px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
    </style>
    <marker id="arrowHead2" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a5dbff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720" />

  <text class="title" x="70" y="70">EO 영상 송출에서의 역할 관계</text>
  <text class="sub" x="70" y="110">발표에서는 송신 측 / 수신 측으로 설명하는 것이 가장 이해하기 쉽습니다.</text>

  <rect class="leftBox" x="90" y="220" width="360" height="220" />
  <text class="boxTitle" x="270" y="290">EO 카메라 모듈</text>
  <text class="boxText" x="270" y="340">영상을 보내는 쪽</text>
  <text class="boxText" x="270" y="375">UDP 송신 측</text>
  <text class="boxText" x="270" y="410">Push 방식으로 전송</text>

  <rect class="rightBox" x="830" y="220" width="360" height="220" />
  <text class="boxTitle" x="1010" y="290">운용통제 PC GUI</text>
  <text class="boxText" x="1010" y="340">영상을 받는 쪽</text>
  <text class="boxText" x="1010" y="375">UDP 포트 5000 대기</text>
  <text class="boxText" x="1010" y="410">수신 서버 역할</text>

  <path class="arrow" d="M450 330 L830 330" />
  <text class="label" x="640" y="300">EO 영상 UDP 전송</text>

  <text class="note" x="90" y="540">핵심 포인트</text>
  <text class="note" x="90" y="585">1. PC가 카메라에 영상을 요청하는 구조가 아닙니다.</text>
  <text class="note" x="90" y="620">2. 카메라가 먼저 영상을 보내고, PC는 포트를 열고 기다리며 수신합니다.</text>
  <text class="note" x="90" y="655">3. 따라서 발표에서는 "카메라 = 송신 측, PC GUI = 수신 측"이라고 설명하면 가장 정확합니다.</text>
</svg>
